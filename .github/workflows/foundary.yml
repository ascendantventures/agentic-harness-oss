name: Foundary Governance Check

on:
  pull_request:
    branches: [main, master]

jobs:
  foundary-audit:
    name: Verify Foundary Pipeline Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Foundary initialized
        run: |
          if [ ! -f ".foundary/config.json" ]; then
            echo "❌ FOUNDARY: .foundary/config.json missing. Run: foundary init"
            exit 1
          fi
          echo "✅ Foundary initialized"

      - name: Require audit trail on all PRs
        run: |
          # Check if this is a foundary-install bootstrap PR (exempt)
          PR_TITLE="${{ github.event.pull_request.title }}"
          if echo "$PR_TITLE" | grep -qiE "install Foundary|initialize Foundary|foundary governance|chore.*foundary"; then
            echo "ℹ️  Bootstrap PR detected — audit trail not required for initial install"
            exit 0
          fi

          # Check for audit artifacts
          if [ -d ".foundary/audit" ] && ls .foundary/audit/*.jsonl >/dev/null 2>&1; then
            echo "✅ Foundary audit trail found"
            
            # Validate entries exist and show summary
            TOTAL_EVENTS=0
            for log in .foundary/audit/*.jsonl; do
              ENTRIES=$(wc -l < "$log")
              TASK=$(basename "$log" .jsonl)
              TOTAL_EVENTS=$((TOTAL_EVENTS + ENTRIES))
              
              # Check last event
              LAST_EVENT=$(tail -1 "$log" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('event','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
              AGENT=$(tail -1 "$log" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('agentId','unknown'))" 2>/dev/null || echo "unknown")
              
              if [ "$LAST_EVENT" = "PIPELINE_COMPLETE" ] || [ "$LAST_EVENT" = "HOTFIX_COMPLETE" ] || [ "$LAST_EVENT" = "RESEARCH_COMPLETE" ]; then
                echo "  ✅ $TASK: $ENTRIES events, $LAST_EVENT (agent: $AGENT)"
              else
                echo "  ⚠️  $TASK: $ENTRIES events, last=$LAST_EVENT (pipeline may not have completed)"
              fi
            done
            
            echo ""
            echo "📋 Total: $TOTAL_EVENTS audit events across $(ls .foundary/audit/*.jsonl | wc -l) pipeline(s)"
          else
            echo "❌ FOUNDARY: No audit trail found on this PR."
            echo ""
            echo "   Every PR must have a Foundary pipeline audit trail."
            echo "   Run one of these before pushing:"
            echo ""
            echo "   Feature work:  foundary run --task '{\"description\":\"...\",\"taskId\":\"...\"}'"
            echo "   Small fix:     foundary hotfix --message \"fix: ...\""
            echo ""
            echo "   The audit trail proves governance was followed."
            exit 1
          fi

      - name: Check for bypass attempts
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          
          # Check for commits that used FOUNDARY_BOOTSTRAP outside of install PRs
          BOOTSTRAP_COMMITS=$(git log "$BASE..$HEAD" --format="%s" | grep -c "FOUNDARY_BOOTSTRAP\|bootstrap" || true)
          if [ "$BOOTSTRAP_COMMITS" -gt 0 ]; then
            echo "⚠️  $BOOTSTRAP_COMMITS commit(s) reference bootstrap bypass"
          fi
          
          echo "✅ Bypass check passed"
